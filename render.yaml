services:
  - type: web
    name: plant-health-api
    env: python
    buildCommand: pip install -r requirements.txt && python train.py
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: MODEL_PATH
        value: model.pkl
      - key: ENCODER_PATH
        value: label_encoder.pkl
